<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <link rel="preload" href="assets/fonts/NotoSansSCSubset-Regular.otf" as="font" type="font/otf" crossorigin>
  <link rel="preload" href="assets/fonts/NotoSansCJKjp-Regular.otf" as="font" type="font/otf" crossorigin>
  <link rel="preload" href="assets/fonts/NotoColorEmoji.ttf" as="font" type="font/ttf" crossorigin>

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="nishiki_flutter">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>nishiki_flutter</title>
  <link rel="manifest" href="manifest.json">
  <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
</head>
<body>
  <script>
    const codexFontPreload = async () => {
      if (!('fonts' in document)) {
        return;
      }

      const fontLoads = [
        document.fonts.load('14px "NotoSansSCSubset"'),
        document.fonts.load('14px "NotoSansCJKjpFallback"'),
        document.fonts.load('14px "NotoEmojiFallback"'),
      ];

      await Promise.race([
        Promise.allSettled(fontLoads),
        new Promise((resolve) => setTimeout(resolve, 2500)),
      ]);
    };

    const startFlutterApp = () => {
      const script = document.createElement('script');
      script.src = 'flutter_bootstrap.js';
      script.async = true;
      document.body.appendChild(script);
    };

    codexFontPreload()
      .catch(() => {})
      .finally(startFlutterApp);
  </script>
</body>
</html>
