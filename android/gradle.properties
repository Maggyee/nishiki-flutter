org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true

# Network hardening for Flutter AAR downloads on unstable links/proxy.
org.gradle.internal.http.connectionTimeout=120000
org.gradle.internal.http.socketTimeout=120000

# Ensure Gradle honors the local SOCKS proxy used by this machine.
systemProp.socksProxyHost=127.0.0.1
systemProp.socksProxyPort=10808

# Work around Windows/Kotlin incremental cache issues when pub cache and project
# live on different drive roots.
kotlin.incremental=false
kotlin.compiler.execution.strategy=in-process
